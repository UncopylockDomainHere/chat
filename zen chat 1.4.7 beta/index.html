<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Zen Chat</title>
  <style>
    ::-webkit-scrollbar { display: none; }
    :root{
      --bg:#36393f; --sidebar:#2f3136; --panel:#40444b; --muted:#8e9297; --text:#dcddde; --accent:#5865f2; --danger:#ff5c5c;
    }
    html,body { height:100%; margin:0; font-family:"Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background:var(--bg); color:var(--text); }
    .app { display:flex; height:100vh; overflow:hidden; }

    /* Sidebar */
    #sidebar { width:300px; background:var(--sidebar); display:flex; flex-direction:column; border-right:1px solid #202225; }
    #channelsHeader { display:flex; align-items:center; justify-content:space-between; padding:12px 14px; border-bottom:1px solid #202225; gap:8px; }
    #channelsHeader h3 { margin:0; font-size:13px; color:var(--muted); text-transform:uppercase; letter-spacing:0.6px; flex:1; }
    #openSettings, #addEntityBtn { background:transparent; border:1px solid rgba(255,255,255,0.04); color:var(--text); padding:6px 8px; border-radius:6px; cursor:pointer; display:inline-flex; align-items:center; gap:6px; }
    #channelsWrap { flex:1; overflow:auto; padding:10px; }

    .category { margin-bottom:8px; user-select:none; }
    .categoryHeader { display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:6px; cursor:pointer; font-weight:600; color:#e6e6e6; }
    .categoryHeader:hover { background:#313338; }
    .cat-arrow { display:inline-block; width:14px; text-align:center; transform:rotate(0deg); transition:transform .15s ease; color:var(--muted); }
    .cat-arrow.open { transform:rotate(90deg); color:var(--text); }
    .channelsList { margin-left:18px; margin-top:6px; display:block; }
    .channelItem { padding:6px 8px; border-radius:6px; margin:4px 0; color:#b9bbbe; cursor:pointer; font-size:14px; display:flex; align-items:center; gap:8px; position:relative; padding-left:18px; transition:background .15s ease; }
    .channelItem:hover { background:#393c43; color:#fff; }
    .channelItem.active { background:#4f545c; color:#fff; }
    .channel-lock { margin-left:auto; font-size:12px; color:var(--muted); }
    .channel-dot { position:absolute; left:-6px; top:50%; transform:translateY(-50%); width:10px; height:10px; border-radius:50%; background:#fff; box-shadow:0 0 0 2px rgba(0,0,0,0.25) inset; }

    /* Main */
    #main { flex:1; display:flex; flex-direction:column; width: 50%;}
    #chat { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:12px; background:linear-gradient(180deg, rgba(255,255,255,0.01), transparent); }
    .message { display:flex; align-items:flex-start; padding:10px; border-radius:8px; transition:0.2s; background:rgba(0,0,0,0.06); }
    .message:hover { box-shadow: 0 0 15px rgba(88,101,242,0.06); }
    .message img.avatar { width:40px; height:40px; border-radius:50%; margin-right:12px; object-fit:cover; }
    .message-content { flex:1; overflow: auto;}
    .message-header { font-size:14px; font-weight:700; color:#fff; margin-bottom:4px; display:flex; align-items:center; gap:8px; }
    .message-header small { color:#72767d; font-weight:400; font-size:12px; }
    .message-text { font-size:15px; line-height:1.5; word-wrap:break-word; white-space:pre-wrap; }

    /* Input */
    #input { display:flex; padding:14px; background:var(--panel); border-top:1px solid #202225; border-radius: 7px; gap:10px; align-items:center; position:relative; }
    #messageInput { flex:1; padding:12px 14px; border-radius:10px; border:none; background:#303338; color:var(--text); font-size:15px; }
    #messageInput:focus { outline:none; background:#2f3136; }
    #sendBtn { padding:10px 18px; border:none; border-radius:10px; background:#505050; color:#fff; font-weight:700; cursor:pointer; }
    #sendBtn:hover { background:#404040; }

    /* Overlays for cooldown/timeout/read-only */
    .inputOverlay { position:absolute; left:14px; right:14px; top:14px; bottom:14px; display:flex; align-items:center; justify-content:center; gap:10px; pointer-events:none; }
    .overlayBox { pointer-events:auto; background:#2b2f33; padding:10px 12px; border-radius:8px; color:#fff; font-weight:700; display:flex; align-items:center; gap:10px; }
    .fadeOut { animation: fadeOutSlide .6s forwards; }
    @keyframes fadeOutSlide {
      0% { opacity:1; transform:translateY(0); }
      100% { opacity:0; transform:translateY(-8px); }
    }

    .cooldown-banner { position:absolute; left:14px; top:-40px; right:14px; background:var(--danger); color:#fff; padding:8px 12px; border-radius:8px; text-align:center; display:none; z-index:10; visibility: hidden;}
    .timeout-banner { position:absolute; left:14px; top:-80px; right:14px; background:#ff9b9b; color:#2b2b2b; padding:8px 12px; border-radius:8px; text-align:center; display:none; z-index:10; }

    /* Users */
    #users { width:240px; background:var(--sidebar); border-left:1px solid #202225; display:flex; flex-direction:column; }
    #users h3 { padding:12px 16px; font-size:12px; font-weight:600; color:var(--muted); text-transform:uppercase; }
    #userList { overflow:auto; flex:1; }
    .userItem { padding:8px; border-radius:6px; color:#b9bbbe; display:flex; gap:8px; align-items:center; }
    .userItem:hover { background:#393c43; color:#fff; }
    .userAvatar { width:28px; height:28px; border-radius:50%; object-fit:cover; }

    /* Modal popup (create) */
    #createPopupOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.55); align-items:center; justify-content:center; z-index:50; }
    #createPopup { width:380px; background:#2f3136; border-radius:10px; padding:14px; box-shadow:0 8px 30px rgba(0,0,0,0.6); }
    #createPopup h2 { margin:0 0 10px 0; color:#fff; }
    #createPopup .btn { width:100%; padding:10px; margin-top:8px; border-radius:8px; border:none; cursor:pointer; font-weight:700; }
    #createPopup .btn.cat { background:#494b51; color:#fff; }
    #createPopup .btn.chan { background:#494b51; color:#fff; }
    #createPopup .btn.cat:hover { background:#5865f2; color:#fff; }
    #createPopup .btn.chan:hover { background:#5865f2; color:#fff; }

#categorySelect { background: #27292d; color: #dcddde; border: none; border-radius: 10px; flex: 1; padding: 12px 14px; }
#newChannelName { background: #27292d; color: #dcddde; border: none; border-radius: 10px; flex: 1; padding: 12px 14px; }
#newChannelChattable { background: #27292d; color: #dcddde; border: none; border-radius: 10px; flex: 1; padding: 12px 14px; }

#newCategoryName { background: #27292d; color: #dcddde; border: none; border-radius: 10px; flex: 1; padding: 12px 14px; }
#newCategoryDesc { background: #27292d; color: #dcddde; border: none; border-radius: 10px; flex: 1; padding: 12px 14px; }

    .muted { color:var(--muted); font-size:13px; }
    .deleteBtn { margin-left:8px; background:#ff5c5c; color:white; border:none; border-radius:6px; padding:6px 8px; cursor:pointer; font-weight:700; }

    /* Settings modal */
    #settingsOverlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.6); align-items:center; justify-content:center; z-index:60; }
    #settings { background:#2f3136; padding:20px; border-radius:10px; width:420px; max-width:95%; display:flex; flex-direction:column; }
    #settings h2 { color:#fff; margin-top:0; }
    #settings input { margin:6px 0; padding:10px; border:none; border-radius:6px; background:#202225; color:#dcddde; }
    #settings button { margin-top:6px; padding:10px; border:none; border-radius:6px; background:#5865f2; color:white; font-weight:600; cursor:pointer; }

    /* Auth Modal (forced) */
    #authOverlay { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:flex; align-items:center; justify-content:center; z-index:1000; }
    #authBox { width:380px; background:#2f3136; padding:20px; border-radius:8px; display:flex; flex-direction:column; gap:10px; }
    #authBox h2 { margin:0; color:#fff; }
    #authBox input { padding:10px; border:none; border-radius:6px; background:#202225; color:#dcddde; }
    #authBox button { padding:10px; border:none; border-radius:6px; background:var(--accent); color:white; cursor:pointer; font-weight:700; }
    #authSwitch { color:var(--text-muted); text-align:center; cursor:pointer; }
    #authSwitch span { color:var(--accent); cursor:pointer; text-decoration:underline; }

    /* message image styling */
    .msg-embed-img { max-width:420px; max-height:480px; border-radius:8px; display:block; margin-top:8px; }

  #popup {position: fixed; top: -200px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 20px 30px; border-radius: 10px; font-size: 18px; transition: top 0.6s ease; box-shadow: 0px 4px 10px rgba(0,0,0,0.25); max-width: 90%; text-align: center; z-index: 9999;}

  #popup.show {top: 40px;}

.offline {
  opacity: 0.45;
}

#users {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* Title */
#users h3 {
  margin-bottom: 6px;
}

/* wrapper contains both online and offline */
#userListsWrapper {
  display: flex;
  flex-direction: column;
  gap: 8px; /* keeps them close but not touching */
  padding: 0 10px 10px 10px;
  overflow: hidden;
}

/* each block (online/offline) */
.userSection {
  display: flex;
  flex-direction: column;
  height: 100%; /* makes both lists balanced & scrollable */
}

/* title above each section */
.sectionTitle {
  color: var(--muted);
  font-size: 12px;
  margin-bottom: 4px;
  text-transform: uppercase;
}

/* scrollable lists */
.scrollSection {
  flex: 1;
  overflow-y: auto;
  padding-right: 5px;
}

#messageUserBtn:hover {
  background: #4752c4;
}

.message-text .mention {
    color: var(--accent);
    font-weight: 700;
}

.message-text .mention:hover {
    opacity: 0.8;
}

.message-text .mention {
    color: var(--accent);
    font-weight: 700;
    text-decoration: none;
}

/* Message action trigger (replaces delete button) */
.msgActionsBtn {
  margin-left: 8px;
  background: transparent;
  border: none;
  color: #b9bbbe;
  cursor: pointer;
  font-size: 18px;
}

.msgActionsBtn:hover {
  color: white;
}

/* Popup menu */
.msgActionsMenu {
  position: absolute;
  background: #2f3136;
  border-radius: 8px;
  padding: 6px;
  display: flex;
  gap: 6px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.45);
  z-index: 9999;
}

/* Icon buttons */
.msgActionItem {
  width: 36px;
  height: 36px;
  border-radius: 6px;
  border: none;
  background: #40444b;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

.msgActionItem:hover {
  background: #5865f2;
}

.msgActionItem.danger:hover {
  background: #ff5c5c;
}

/* Reaction Emoji Picker */
.reaction-ui {
  position: absolute;
  background: #2f3136;
  border-radius: 10px;
  padding: 8px;
  width: 300px;
  max-height: 260px;
  overflow-y: auto;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  z-index: 10000;
}

.reaction-ui button {
  font-size: 16px;
  background: #40444b;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  padding: 6px;
}

.reaction-ui button:hover {
  background: #5865f2;
}

/* Channel / Category context menu */
.channelContextMenu {
  position: fixed;
  background: #2f3136;
  border-radius: 10px;
  padding: 6px;
  display: flex;
  gap: 6px;
  box-shadow: 0 8px 25px rgba(0,0,0,0.6);
  z-index: 10000;
}

.channelContextBtn {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  border: none;
  background: #40444b;
  color: white;
  cursor: pointer;
  font-size: 16px;
}

.channelContextBtn:hover {
  background: #5865f2;
}

.channelContextBtn.danger:hover {
  background: #ff5c5c;
}

.msg-embed-img {
  cursor: zoom-in;
}

  </style>
</head>

<button id="pollMenuBtn" style="

">＋</button>

                    lastReadTs = lr.toMillis ? lr.toMillis() : lr;

                    if (!existingDot) {
                      const dot = document.createElement("span");
                      dot.className = "channel-dot";

                  } else {

// ─── HIDE OFF-SCREEN EMOJIS (PERFORMANCE) ───
let rafPending = false;

function updateVisibleEmojis() {
  if (rafPending) return;
  rafPending = true;

  requestAnimationFrame(() => {
    rafPending = false;

    const pickerRect = picker.getBoundingClientRect();

    picker.querySelectorAll("button").forEach(btn => {
      const r = btn.getBoundingClientRect();

      // If emoji is far outside view, hide it
      if (r.bottom < pickerRect.top - 40 || r.top > pickerRect.bottom + 40) {
        btn.style.visibility = "hidden";
      } else {
        btn.style.visibility = "visible";
      }
    });
  });
}

// Run once on open
updateVisibleEmojis();

// Update on scroll
picker.addEventListener("scroll", updateVisibleEmojis);

  // Position ABOVE input bar
  picker.style.bottom = "70px";
  picker.style.right = "90px";

  document.addEventListener("click", () => picker.remove(), { once: true });
});

    // Helper: sanitize text for insertion as text node (basic)
    function escapeHtml(s){
      if (typeof s !== "string") return s;
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
    }

// Cache: username → uid
const usernameToUid = {};

async function loadUsernameMap() {
    if (Object.keys(usernameToUid).length) return;
    const snap = await getDocs(collection(db, "users"));
    snap.forEach(doc => {
        const data = doc.data();
        if (data && data.username) usernameToUid[data.username] = doc.id;
    });
}

// Turn @username into <span class="mention">@username</span>
function createMessageNodesWithMentions(rawText) {
    const frag = document.createDocumentFragment();
    const mentionRe = /@([a-zA-Z0-9_\-]+)/g;

    let last = 0;
    let match;

    while ((match = mentionRe.exec(rawText)) !== null) {
        const before = rawText.slice(last, match.index);
        if (before) frag.appendChild(document.createTextNode(before));

        const user = match[1];
        const span = document.createElement("span");
        span.className = "mention";
        span.textContent = "@" + user;
        span.dataset.username = user;

        span.addEventListener("click", async () => {
            await loadUsernameMap();
            const uid = usernameToUid[user];
            if (uid) openUserProfile(uid);
            else alert("User not found: @" + user);
        });

        frag.appendChild(span);
        last = mentionRe.lastIndex;
    }

    const tail = rawText.slice(last);
    if (tail) frag.appendChild(document.createTextNode(tail));

    return frag;
}

    // Helper: fetch users/{uid} doc (returns data or null)
    async function fetchUserDoc(uid) {
      try {
        const d = await getDoc(doc(db,"users",uid));
        return d.exists() ? { id: d.id, ...d.data() } : null;
      } catch (e) { console.error("fetchUserDoc error", e); return null; }
    }

    // Helper: fetch channel doc (categories/{cat}/channels/{chan})
    async function fetchChannelDoc(catId, chanId) {
      try {
        const d = await getDoc(doc(db,"categories",catId,"channels",chanId));
        return d.exists() ? { id: d.id, ...d.data() } : null;
      } catch (e) { console.error("fetchChannelDoc error", e); return null; }
    }

    let timeoutInterval = null; // interval ID for countdown

    // Show overlay with message (read-only or timeout or cooldown)
    function showOverlay(text) {
      overlayBox.textContent = text;
      overlayContainer.style.display = "flex";
    }

    // Animate overlay out and hide
    function hideOverlayAnimated() {
      overlayBox.classList.add("fadeOut");
      setTimeout(()=>{
        overlayBox.classList.remove("fadeOut");
        overlayContainer.style.display = "none";
        overlayBox.textContent = "";
      }, 600);
    }

    // Switch channel & subscribe messages
    async function switchChannel(catId, chanId, chanName){
      if (messagesUnsub) messagesUnsub();
      currentCategoryId = catId; currentChannelId = chanId;
      // fetch and cache channel doc
      currentChannelDoc = await fetchChannelDoc(catId, chanId);

      // clear any overlay & timers
      if (timeoutInterval) { clearInterval(timeoutInterval); timeoutInterval = null; }
      overlayContainer.style.display = "none";
      cooldownBanner.style.display = "none";
      timeoutBanner.style.display = "none";

      // UI state
      messageInput.placeholder = `Message #${chanName}`;
      document.querySelectorAll(".channelItem").forEach(el => el.classList.toggle("active", el.dataset.cat === catId && el.dataset.chan === chanId));
      // by default enable input; we'll adjust based on locked/timeout
      messageInput.disabled = false; sendBtn.disabled = false;

      // check chattable: if chattable false and user is not admin -> disable input and show overlay

document.addEventListener('DOMContentLoaded', (event) => {
    // Select all iframes on the page
    const lazyIframes = document.querySelectorAll('iframe[data-src]');

    const iframeObserver = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                const iframe = entry.target;
                const src = iframe.getAttribute('data-src');
                
                // Only load if the data-src is present
                if (src) {
                    iframe.setAttribute('src', src);
                    iframe.removeAttribute('data-src'); // Optional: remove the data attribute
                    observer.unobserve(iframe); // Stop observing once loaded
                }
            }
        });
    }, {
        rootMargin: '0px 0px 50px 0px', // Preload when 50px from viewport
        threshold: 0.0 // Trigger as soon as even a small part is visible
    });

    // Start observing each iframe
    lazyIframes.forEach(iframe => {
        iframeObserver.observe(iframe);
    });
});

  <script>
(function() {
  // Detects any Google Drive link + extracts file ID from /file/d/... or ?id=
  const driveFilePattern1 = /https?:\/\/drive\.google\.com\/file\/d\/([a-zA-Z0-9_-]+)/i;
  const driveFilePattern2 = /[?&]id=([a-zA-Z0-9_-]+)/i;
  const fullDriveUrlPattern = /(https?:\/\/(?:drive|docs)\.google\.com\/\S+)/gi;

  function createDownloadButton(fileId) {
    const btn = document.createElement("button");
    btn.textContent = "Download";
    btn.style.padding = "6px 12px";
    btn.style.margin = "4px 0";
    btn.style.cursor = "pointer";
    btn.style.background = "#5865f2";
    btn.style.color = "white";
    btn.style.border = "none";

    btn.onclick = () => {
      window.open("https://drive.google.com/uc?export=download&id=" + fileId, "_blank");
    };

    return btn;
  }

  function processNode(node) {
    if (!node) return;

    // TEXT NODE — check for Drive link and remove it
    if (node.nodeType === Node.TEXT_NODE) {
      const text = node.textContent;

      // Try extracting File ID
      let match = text.match(driveFilePattern1);
      let fileId = match ? match[1] : null;

      if (!fileId) {
        match = text.match(driveFilePattern2);
        if (match) fileId = match[1];
      }

      // If no file ID → skip
      if (!fileId) return;

      // Remove the link from the text
      const cleaned = text.replace(fullDriveUrlPattern, "").trim();
      if (cleaned !== text) {
        node.textContent = cleaned;
      }
    }

    // ELEMENT NODE — handle <a> tags and children
    if (node.nodeType === Node.ELEMENT_NODE) {
      // Remove <a href="...drive.google.com..."> and replace with button
      if (
        node.matches &&
        node.matches('a[href*="drive.google.com"], a[href*="docs.google.com"]')
      ) {
        // Extract file ID from href
        let href = node.getAttribute("href");
        let match = href.match(driveFilePattern1) || href.match(driveFilePattern2);
        if (match) {
          const fileId = match[1];
          const btn = createDownloadButton(fileId);
          node.replaceWith(btn);
        } else {
          node.remove(); // Not a file link → remove
        }
        return;
      }

      // Recurse into DOM
      node.childNodes.forEach(processNode);
    }
  }

  // Run every 1 ms
  setInterval(() => {
    processNode(document.body);
  }, 1);

})();
  </script>
  <script>
(function () {
    const videoExts = ["mp4", "webm", "mov", "m4v", "ogg"];
    const imageExts = ["png", "jpg", "jpeg", "gif", "webp", "bmp", "svg"];

    function processMessages() {
        document.querySelectorAll(".message-content").forEach(container => {
            const msgText = container.querySelector(".message-text");
            if (!msgText) return;

            // Prevent double-processing
            if (msgText.dataset.mediaProcessed === "1") return;

            let text = msgText.innerHTML;

            // Regex to find URLs or data URLs
            const urlRegex = /(https?:\/\/[^\s<]+)|(www\.[^\s<]+)|(data:[^"' ]+)/g;

            let match;
            let foundURL = null;
            let type = null;

            while ((match = urlRegex.exec(text)) !== null) {
                const url = match[0];

                // Detect data:image base64
                if (url.startsWith("data:image/")) {
                    foundURL = url;
                    type = "image";
                    break;
                }

                // Detect data:video base64
                if (url.startsWith("data:video/")) {
                    foundURL = url;
                    type = "video";
                    break;
                }

                // Extract normal extension
                const ext = url.split(".").pop().toLowerCase().split(/[?#]/)[0];

                if (videoExts.includes(ext)) {
                    foundURL = url;
                    type = "video";
                    break;
                }

                if (imageExts.includes(ext)) {
                    foundURL = url;
                    type = "image";
                    break;
                }
            }

            if (foundURL) {
                // Remove ONLY the link text
                msgText.innerHTML = text.replace(foundURL, "").trim();

                let element;

                if (type === "video") {
                    element = document.createElement("video");
                    element.controls = true;
                    element.src = foundURL;
                    element.style.maxWidth = "77%";
                    element.style.display = "block";
                    element.style.marginTop = "8px";
                    element.style.borderRadius = "8px";
                }

                if (type === "image") {
                    element = document.createElement("img");
                    element.src = foundURL;
                    element.style.maxWidth = "77%";
                    element.style.display = "block";
                    element.style.marginTop = "8px";
                    element.style.borderRadius = "8px";
                }

                container.appendChild(element);
            }

            msgText.dataset.mediaProcessed = "1";
        });
    }

    // Continuously scan dynamically added messages
    setInterval(processMessages, 150);
})();
  </script>

background:black;color:#aaffaa;
border:none;border-top:1px solid rgba(170,255,170,.3);
font-family:monospace;font-size:13px;
padding:4px;display:none;
`;
input.placeholder = "> command";
panel.appendChild(input);

/* TOGGLE */
let consoleOpen = false;
header.onclick = () => {
 consoleOpen = !consoleOpen;
 logBox.style.maxHeight = consoleOpen ? "220px" : "0px";
 input.style.display = consoleOpen ? "block" : "none";
 header.textContent = "Debug Console  " + (consoleOpen ? "<" : ">");
};

function toggleDebug() {
 debugVisible = !debugVisible;
 panel.style.display = debugVisible ? "block" : "none";
 if (debugVisible) input.focus();
}

/* ================= DRAG ================= */
let drag = false, ox = 0, oy = 0;
panel.onmousedown = e => {
 const r = panel.getBoundingClientRect();
 const x = e.clientX - r.left, y = e.clientY - r.top;
 if (x < 10 || x > r.width - 10 || y < 10 || y > r.height - 10) {
  drag = true; ox = x; oy = y;
 }
};
onmousemove = e => drag && (
 panel.style.left = e.clientX - ox + "px",
 panel.style.top = e.clientY - oy + "px"
);
onmouseup = () => drag = false;

/* ================= ADVANCED DEBUG ================= */
let last = performance.now(), fps = 0, frameMS = 0, acc = 0, frames = 0, lowTimer = 0;

function getGPU() {
 try {
  const c = document.createElement("canvas");
  const g = c.getContext("webgl");
  const e = g.getExtension("WEBGL_debug_renderer_info");
  return g.getParameter(e.UNMASKED_RENDERER_WEBGL);
 } catch { return "Unknown"; }
}

requestAnimationFrame(function loop(now) {
 const d = now - last; last = now;
 const rawFPS = 1000 / d;
 frameMS = d;

 acc += d; frames++;
 rawFPS < 45 ? lowTimer += d : lowTimer = Math.max(0, lowTimer - d * 2);

 if (acc >= 250) {
  fps = (frames * 1000 / acc) | 0;
  acc = frames = 0;
 }

 const mem = performance.memory;

 stats.textContent = `
FPS: ${fps}
Frame: ${frameMS.toFixed(2)} ms
CPU Threads: ${navigator.hardwareConcurrency}
RAM: ${navigator.deviceMemory || "?"} GB
JS Heap: ${mem ? (mem.usedJSHeapSize / 1048576).toFixed(1) + " MB" : "N/A"}
GPU: ${getGPU()}
Status: ${
  fps < 30 ? "⚠ FPS Critical" :
  fps < 50 ? "⚠ FPS Dropping" :
  lowTimer > 2000 ? "⚠ Sustained Lag" :
  "✔ Stable"
 }
`.trim();

 requestAnimationFrame(loop);
});

/* ================= COMMAND SYSTEM ================= */
const history = [];
let h = 0;

const hiddenCommands = new Set(["$goon", "$overlaymedia"]);

input.onkeydown = e => {
 if (e.key === "Enter") {
  const raw = input.value.trim();
  if (!raw) return;
  const cmd = raw.split(" ")[0].toLowerCase();
  if (!hiddenCommands.has(cmd)) log("> " + raw);
  run(raw);
  history.push(raw); h = history.length;
  input.value = "";
 }
 if (e.key === "ArrowUp") input.value = history[Math.max(0, --h)] || "";
 if (e.key === "ArrowDown") input.value = history[Math.min(history.length, ++h)] || "";
};

function log(msg, c = "#aaffaa") {
 logBox.innerHTML += `<div style="color:${c}">${msg}</div>`;
 logBox.scrollTop = 1e9;
}

/* ================= COMMANDS ================= */
const commands = {};

/* BASIC */
commands.$help = { desc:"List commands", run(){
 Object.entries(commands).forEach(([k,v])=>{
  if(!hiddenCommands.has(k)) log(`${k} — ${v.desc}`);
 });
}};
commands.$clear = { desc:"Clear console", run(){ logBox.innerHTML=""; }};
commands.$editdoc = { desc:"Toggle designMode", run(){
 document.designMode = document.designMode === "on" ? "off" : "on";
 log("designMode = " + document.designMode);
}};
commands.$eval = { desc:"Eval JS", run(a){
 try { log(String(Function(`return ${a}`)())); }
 catch(e){ log(e.message,"#f88"); }
}};

/* ================= DISCO (FULLSCREEN RGB) ================= */
let discoOverlay = null;

commands.$disco = {
 desc:"Fullscreen RGB disco",
 run(){
  if(discoOverlay){
   discoOverlay.remove();
   discoOverlay = null;
   document.body.classList.remove("shake");
   return;
  }

  discoOverlay = document.createElement("div");
  discoOverlay.style = `
   position:fixed;inset:0;
   z-index:9999998;
   pointer-events:none;
   animation:rgbFlash .6s linear infinite;
   opacity:0.2;
  `;
  document.body.appendChild(discoOverlay);
  document.body.classList.add("shake");
 }
};

commands.$crt = { desc:"CRT scanlines", run(){
 document.body.classList.toggle("crt");
}};

/* ================= CHAOS ================= */
commands.$panic = { desc:"Fake errors", run(){
 for(let i=0;i<12;i++) setTimeout(()=>log("⚠ SYSTEM ERROR","#f88"),i*80);
}};
commands.$hack = { desc:"Fake hacking", run(){
 ["Accessing kernel…","Bypassing firewall…","Injecting payload…","Done."]
 .forEach((t,i)=>setTimeout(()=>log(t),i*600));
}};
commands.$freeze = { desc:"Freeze page", run(){
 document.body.style.pointerEvents="none";
 document.body.style.filter="blur(2px)";
}};
commands.$unfreeze = { desc:"Unfreeze page", run(){
 document.body.style.pointerEvents="";
 document.body.style.filter="";
}};

/* ================= HIDDEN ================= */
commands.$goon = { desc:"", run:goon };
commands.$overlaymedia = { desc:"", run(){
 if(window.__overlay) return;
 window.__overlay = true;

 const img = document.createElement("img");
 img.src="https://media.tenor.com/2roX3uxz_68AAAAC/cat-space.gif";
 img.style="position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:9999999";
 document.body.appendChild(img);

 const a = document.createElement("audio");
 a.src="https://files.catbox.moe/1n6l6y.mp3";
 a.loop=true; a.autoplay=true;
 document.body.appendChild(a);
}};

/* ================= RUNNER ================= */
function run(raw){
 const [cmd,...args] = raw.split(" ");
 const c = commands[cmd.toLowerCase()];
 c ? c.run(args.join(" ")) :
 !hiddenCommands.has(cmd.toLowerCase()) && log("Unknown command","#888");
}

/* ================= EFFECTS ================= */
let goonVideo;
function goon(){
 if(goonVideo) return;
 goonVideo = document.createElement("video");
 goonVideo.src="https://files.catbox.moe/ev54v0.mp4";
 goonVideo.autoplay=true;
 goonVideo.loop=true;
 goonVideo.playsInline=true;
 goonVideo.style="position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;z-index:9999999";
 document.body.appendChild(goonVideo);
 goonVideo.play().catch(()=>{});
}

/* ================= STYLES ================= */
const style = document.createElement("style");
style.textContent = `
@keyframes rgbFlash{
 0%{background:red}
 33%{background:lime}
 66%{background:blue}
 100%{background:red}
}
.crt::before{
 content:"";position:fixed;inset:0;
 background:repeating-linear-gradient(#0000,#0000 2px,#0003 3px);
 pointer-events:none;z-index:99999999;
}
`;
document.head.appendChild(style);
</script>
<script>
(function() {
    const MAX_CONTEXTS = 8; // Recommended limit for stability
    const activeContexts = [];

    const originalGetContext = HTMLCanvasElement.prototype.getContext;

    HTMLCanvasElement.prototype.getContext = function(type, attributes) {
        if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
            // If we've reached the limit, force the oldest context to close
            if (activeContexts.length >= MAX_CONTEXTS) {
                const oldest = activeContexts.shift();
                if (oldest) {
                    const extension = oldest.getExtension('WEBGL_lose_context');
                    if (extension) extension.loseContext();
                }
            }
            
            const context = originalGetContext.apply(this, arguments);
            if (context) activeContexts.push(context);
            return context;
        }
        return originalGetContext.apply(this, arguments);
    };
})();
</script>
<script>
(() => {
  // Only run on large screens
  if (!window.matchMedia("(min-width: 1024px)").matches) return;

  // Inject optimized CSS
  const style = document.createElement("style");
  style.textContent = `
    .message {
      transition: opacity 0.2s ease;
      contain: paint;
      will-change: opacity;
    }
    .message.__offscreen {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
  `;
  document.head.appendChild(style);

  // Single shared observer (cheap)
  const observer = new IntersectionObserver(
    entries => {
      for (const entry of entries) {
        entry.target.classList.toggle(
          "__offscreen",
          !entry.isIntersecting
        );
      }
    },
    {
      threshold: 0,
      // Start fading slightly before fully leaving viewport
      rootMargin: "200px 0px 200px 0px"
    }
  );

  // Observe existing messages
  const messages = document.querySelectorAll(".message");
  for (const el of messages) {
    observer.observe(el);
  }

  // OPTIONAL: handle dynamically added messages (cheap guard)
  if (messages.length < 2000) {
    const mo = new MutationObserver(mutations => {
      for (const m of mutations) {
        for (const node of m.addedNodes) {
          if (
            node.nodeType === 1 &&
            node.classList?.contains("message")
          ) {
            observer.observe(node);
          }
        }
      }
    });

    mo.observe(document.body, { childList: true, subtree: true });
  }
})();
</script>
