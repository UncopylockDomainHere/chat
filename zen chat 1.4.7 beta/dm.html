<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Direct Messages</title>
<style>
body {
    background: #2f3136;
    color: white;
    font-family: "Segoe UI";
    margin: 0;
}
#topBar {
    background: #202225;
    padding: 12px;
    font-size: 18px;
    font-weight: bold;
    display: flex;
    align-items: center;
    gap: 10px;
}
#topBar img {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    object-fit: cover;
}
#messages {
    height: calc(100vh - 140px);
    overflow-y: auto;
    padding: 15px;
}
.message {
    background: #40444b;
    padding: 10px;
    border-radius: 8px;
    margin-bottom: 10px;
}
#inputArea {
    display: flex;
    padding: 12px;
    background: #202225;
}
#textInput {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    background: #303338;
    color: white;
}
#sendBtn {
    margin-left: 10px;
    padding: 10px 18px;
    border: none;
    background: #5865f2;
    color: white;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
}
</style>
</head>
<body>

<div id="topBar">
    <img id="pfp">
    <span id="username">Loading...</span>
</div>

<div id="messages"></div>

<div id="inputArea">
    <input id="textInput" placeholder="Message..." autocomplete="off">
    <button id="sendBtn">Send</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
import {
  getFirestore, doc, getDoc, addDoc,
  collection, query, onSnapshot, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";
import {
  getAuth, onAuthStateChanged, signInAnonymously
} from "https://www.gstatic.com/firebasejs/9.22.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBVdE5zUA70La3onDqcyxFm59WWyZku6Q4",
  authDomain: "test-56169.firebaseapp.com",
  projectId: "test-56169",
  databaseURL: "https://test-56169-default-rtdb.firebaseio.com",
  storageBucket: "test-56169.firebasestorage.app",
  messagingSenderId: "1057452370766",
  appId: "1:1057452370766:web:6ab94656e9c2c25b634c1f"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// Auto anonymous login
signInAnonymously(auth).catch(e => console.log("Anon login:", e));

const params = new URLSearchParams(window.location.search);
const targetUID = params.get("user");

const usernameEl = document.getElementById("username");
const pfpEl = document.getElementById("pfp");
const messagesDiv = document.getElementById("messages");
const input = document.getElementById("textInput");
const sendBtn = document.getElementById("sendBtn");

onAuthStateChanged(auth, async (user) => {
  if (!user) return;
  console.log("Logged into dm.html as:", user.uid);
  loadDM(user);
});

async function loadDM(currentUser) {
  if (!targetUID) {
    alert("Invalid user!");
    return;
  }

  // Load target user info for top bar
  const targetSnap = await getDoc(doc(db, "users", targetUID));
  const targetData = targetSnap.data();
  usernameEl.textContent = targetData?.username || "Unknown";
  pfpEl.src = targetData?.pfp || "";

  const roomId = [currentUser.uid, targetUID].sort().join("_");
  const msgRef = collection(db, "dmRooms", roomId, "messages");

  // Cache for user profiles
  const userCache = new Map();

  onSnapshot(query(msgRef, orderBy("createdAt")), async (snap) => {
    messagesDiv.innerHTML = "";

    for (const docSnap of snap.docs) {
      const msg = docSnap.data();

      // Fetch sender profile
      let userData;
      if (userCache.has(msg.uid)) {
        userData = userCache.get(msg.uid);
      } else {
        const userSnap = await getDoc(doc(db, "users", msg.uid));
        userData = userSnap.exists() ? userSnap.data() : { username: "Unknown", pfp: "" };
        userCache.set(msg.uid, userData);
      }

      // Message container
      const div = document.createElement("div");
      div.className = "message";
      div.style.display = "flex";
      div.style.alignItems = "center";
      div.style.gap = "10px";

      // Profile pic
      const img = document.createElement("img");
      img.src = userData.pfp || "";
      img.alt = "pfp";
      img.style.width = "32px";
      img.style.height = "32px";
      img.style.borderRadius = "50%";
      img.style.objectFit = "cover";

      // Username + text
      const textContainer = document.createElement("div");
      const usernameDiv = document.createElement("div");
      usernameDiv.textContent = userData.username || "Unknown";
      usernameDiv.style.fontWeight = "bold";
      usernameDiv.style.fontSize = "14px";
      const textDiv = document.createElement("div");
      textDiv.textContent = msg.text;

      textContainer.appendChild(usernameDiv);
      textContainer.appendChild(textDiv);

      div.appendChild(img);
      div.appendChild(textContainer);
      messagesDiv.appendChild(div);
    }

    messagesDiv.scrollTop = messagesDiv.scrollHeight;
  });

  sendBtn.addEventListener("click", async () => {
    const text = input.value.trim();
    if (!text) return;
    input.value = "";

    await addDoc(msgRef, {
      text,
      uid: currentUser.uid,   // Must match your profile UID
      createdAt: serverTimestamp()
    });
  });
}
</script>
<script src="version.js" async></script>
</body>
</html>
